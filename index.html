<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Personal App</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#000000">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="centered">
    <h1>🔐 Private Access</h1>
    <input type="password" id="pinInput" maxlength="4" placeholder="Enter 4-digit PIN">
    <button onclick="checkPin()">Unlock</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

<nav>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('budget')">Budget</button>
    <button onclick="showPage('gallery')">Gallery</button>
    <button onclick="showPage('misc')">Misc</button>
    <button onclick="showPage('settings')">Settings</button>
</nav>

<!-- HOME -->
<section id="home" class="page">
    <h2>📊 Dashboard</h2>
    <div class="card" onclick="showPage('budget')">💰 Budget</div>
    <div class="card" onclick="showPage('gallery')">🖼 Gallery</div>
    <div class="card" onclick="showPage('misc')">📂 Miscellaneous</div>
</section>

<!-- BUDGET -->
<section id="budget" class="page hidden">
    <h2>💰 Budget Ledger</h2>

    <input type="text" id="particular" placeholder="Particular">
    
    <select id="type">
        <option value="Income">Income</option>
        <option value="Expense">Expense</option>
    </select>

    <input type="date" id="date">
    <input type="number" id="amount" placeholder="Amount">

    <button onclick="addTransaction()">Add Transaction</button>

    <table id="ledger">
        <thead>
            <tr>
                <th>Date</th>
                <th>Particular</th>
                <th>Type</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</section>

<!-- GALLERY -->
<section id="gallery" class="page hidden">
    <h2>🖼 Memory Timeline</h2>

    <input type="file" id="photoInput" accept="image/*">
    <input type="date" id="photoDate">
    <textarea id="description" placeholder="Write your memory..."></textarea>

    <button onclick="addMemory()">Save Memory</button>

    <div id="timeline"></div>
</section>

<!-- MISC -->
<section id="misc" class="page hidden">
    <h2>📂 Miscellaneous</h2>
    <p>Future expansion area.</p>
</section>

<!-- SETTINGS -->
<section id="settings" class="page hidden">
    <h2>⚙ Settings</h2>

    <input type="password" id="newPin" maxlength="4" placeholder="New 4-digit PIN">
    <button onclick="changePin()">Change PIN</button>

    <button onclick="clearData()">Clear All Data</button>
</section>

</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
